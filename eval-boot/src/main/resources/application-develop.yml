# 开发环境共享配置 — 提交到 Git
# 密钥等敏感信息通过环境变量注入，本地开发用 application-local.yml 覆盖

spring:
  config:
    activate:
      on-profile: develop
  datasource:
    url: jdbc:mysql://localhost:3306/eval_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    io.github.accontra.eval: DEBUG

llm:
  primary:
    provider: deepseek
    api-key: ${DEEPSEEK_API_KEY}
    base-url: https://api.deepseek.com
    model: deepseek-chat
    temperature: 0.3
  fallbacks:
    - provider: glm
      api-key: ${GLM_API_KEY}
      base-url: https://open.bigmodel.cn/api/paas/v4
      model: glm-4.5-air
      temperature: 0.3
  retry:
    max-retries: 1
  circuit:
    threshold: 5
    half-open-ms: 30000
  token-budget:
    max-per-eval: 8000

qdrant:
  host: localhost
  port: 6333
  collection: eval_cases
  vector-size: 512
